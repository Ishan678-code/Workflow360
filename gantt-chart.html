<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Workflow360 – Gantt Chart</title>
  <style>
    @page { size: A4 landscape; margin: 12mm; }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #fff;
      color: #000;
      padding: 10mm;
      width: 277mm;
      margin: 0 auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    /* Column widths */
    col.task-col { width: 22%; }
    col.week-col { width: calc(78% / 12); }

    /* Header row */
    thead tr th {
      font-size: 9pt;
      font-weight: bold;
      text-align: center;
      padding: 6px 2px;
      border: 1px solid #c0c0c0;
      background: #fff;
      color: #000;
    }

    thead tr th.task-header {
      text-align: left;
      font-size: 13pt;
      font-weight: bold;
      letter-spacing: 0.5px;
      border: none;
      padding-left: 4px;
    }

    /* Task rows */
    tbody tr {
      height: 46px;
    }

    tbody tr td {
      border: 1px solid #c0c0c0;
      padding: 0;
    }

    tbody tr td.task-name {
      font-size: 9.5pt;
      font-weight: normal;
      padding: 0 6px;
      border: none;
      border-right: 1px solid #c0c0c0;
      vertical-align: middle;
    }

    /* Active cell — dark blue fill */
    td.active {
      background-color: #12235f;
    }

    /* Empty cell */
    td.empty {
      background-color: #fff;
    }
  </style>
</head>
<body>

<table>
  <colgroup>
    <col class="task-col" />
    <col class="week-col" /><col class="week-col" /><col class="week-col" />
    <col class="week-col" /><col class="week-col" /><col class="week-col" />
    <col class="week-col" /><col class="week-col" /><col class="week-col" />
    <col class="week-col" /><col class="week-col" /><col class="week-col" />
  </colgroup>

  <thead>
    <tr>
      <th class="task-header">TASKS</th>
      <th>Week 1</th><th>Week 2</th><th>Week 3</th>
      <th>Week 4</th><th>Week 5</th><th>Week 6</th>
      <th>Week 7</th><th>Week 8</th><th>Week 9</th>
      <th>Week 10</th><th>Week 11</th><th>Week 12</th>
    </tr>
  </thead>

  <tbody>

    <!-- Requirement Gathering: Week 1–2 -->
    <tr>
      <td class="task-name">Requirement Gathering</td>
      <td class="active"></td>
      <td class="active"></td>
      <td class="empty"></td><td class="empty"></td><td class="empty"></td>
      <td class="empty"></td><td class="empty"></td><td class="empty"></td>
      <td class="empty"></td><td class="empty"></td><td class="empty"></td>
      <td class="empty"></td>
    </tr>

    <!-- Planning and Designing: Week 2–3 -->
    <tr>
      <td class="task-name">Planning and Designing</td>
      <td class="empty"></td>
      <td class="active"></td>
      <td class="active"></td>
      <td class="empty"></td><td class="empty"></td><td class="empty"></td>
      <td class="empty"></td><td class="empty"></td><td class="empty"></td>
      <td class="empty"></td><td class="empty"></td><td class="empty"></td>
    </tr>

    <!-- System Development and Coding: Week 3–9 -->
    <tr>
      <td class="task-name">System Development and Coding</td>
      <td class="empty"></td><td class="empty"></td>
      <td class="active"></td>
      <td class="active"></td>
      <td class="active"></td>
      <td class="active"></td>
      <td class="active"></td>
      <td class="active"></td>
      <td class="active"></td>
      <td class="empty"></td><td class="empty"></td><td class="empty"></td>
    </tr>

    <!-- Testing and Debugging: Week 7–11 -->
    <tr>
      <td class="task-name">Testing and Debugging</td>
      <td class="empty"></td><td class="empty"></td><td class="empty"></td>
      <td class="empty"></td><td class="empty"></td><td class="empty"></td>
      <td class="active"></td>
      <td class="active"></td>
      <td class="active"></td>
      <td class="active"></td>
      <td class="active"></td>
      <td class="empty"></td>
    </tr>

    <!-- Documentation: Week 9–12 -->
    <tr>
      <td class="task-name">Documentation</td>
      <td class="empty"></td><td class="empty"></td><td class="empty"></td>
      <td class="empty"></td><td class="empty"></td><td class="empty"></td>
      <td class="empty"></td><td class="empty"></td>
      <td class="active"></td>
      <td class="active"></td>
      <td class="active"></td>
      <td class="active"></td>
    </tr>

  </tbody>
</table>

</body>
</html>
